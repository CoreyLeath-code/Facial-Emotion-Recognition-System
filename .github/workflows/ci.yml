name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip "setuptools>=83" && pip install -e ".[dev]"
      - run: ruff format --check src/api/validation.py src/src/config/settings.py src/src/rag/context_retriever.py tests/production
      - run: ruff check src/api/validation.py src/src/config/settings.py src/src/rag/context_retriever.py tests/production
      - run: mypy
      - run: pytest
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage.xml

  package-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build && python -m build
      - run: docker build -t fer:${{ github.sha }} .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade "setuptools>=83" && pip install -e ".[dev]"
      - run: bandit -c pyproject.toml -r src/api src/src
      - run: pip-audit --skip-editable
      - run: pip-licenses --format=json --output-file=licenses.json
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: security-inventory
          path: |
            licenses.json
            sbom.spdx.json

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/production/test_benchmark.py --benchmark-only --benchmark-json=benchmarks/latest.json --no-cov
      - uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ github.sha }}
          path: benchmarks/latest.json
