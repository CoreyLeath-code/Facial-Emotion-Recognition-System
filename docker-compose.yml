services:
  api:
    build: .
    image: facial-emotion-recognition:local
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /models/emotion_model.pt
      ALLOWED_ORIGINS: http://localhost:8501
      MAX_UPLOAD_BYTES: "5242880"
    volumes:
      - ./artifacts/models:/models:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
